name: coffee_app
description: Flutter application which gives the user the ability to save their favorite coffee pictures
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.8.0

dependencies:
  bloc: ^9.0.0
  cached_network_image: ^3.4.1
  dartz: ^0.10.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  get_it: ^8.2.0
  get_storage: ^2.1.1
  go_router: ^16.2.5
  http: ^1.5.0
  hydrated_bloc: ^10.1.1
  injectable: ^2.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path_provider: ^2.1.5

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.6.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.8.1
  json_serializable: ^6.10.0
  mocktail: ^1.0.4
  mocktail_image_network: ^1.2.0
  remove_from_coverage: ^2.0.0
  very_good_analysis: ^9.0.0

flutter:
  generate: true
  uses-material-design: true

scripts: derry.yaml
